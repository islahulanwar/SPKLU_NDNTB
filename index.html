// ====== BACA CSV JADWAL ======
async function getJadwal() {
const res = await fetch('jadwal.csv');
const text = await res.text();
return text.split('\n').slice(1).map(r=>{
const [tgl,mulai,selesai,nama,no]=r.split(',');
return {tgl,mulai,selesai,nama,no};
});
}

function nowTime(){return new Date().toTimeString().slice(0,5);}
function nowDate(){return new Date().toISOString().slice(0,10);}

async function start(){
const url = new URL(window.location.href);
const id = url.searchParams.get("id");
const lokasi = lokasiSPKLU[id] || id;

document.getElementById("lokasi").innerText = lokasi;

const jadwal = await getJadwal();
const shift = jadwal.find(j =>
j.tgl === nowDate() &&
nowTime() >= j.mulai &&
nowTime() <= j.selesai
);

if(!shift){
document.getElementById("status").innerHTML =
"<div class='error'>Tidak ada teknisi piket saat ini</div>";
return;
}

const pesan = `Halo mas ${shift.nama}, Saya berada di ${lokasi}.

• Detail kendala: 
• Waktu: ${nowDate()} ${nowTime()}
Mohon bantuan untuk pengecekan unit SPKLU.

*Mohon lampirkan foto kendala pada SPKLU jika ada.`;

const link = `https://wa.me/${shift.no}?text=${encodeURIComponent(pesan)}`;

setTimeout(()=>{ window.location.href = link; }, 2500);
}

window.onload = start;
