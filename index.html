<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bantuan SPKLU PLN</title>

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg,#0f4c81,#1e88e5);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}
.card{
  background:white;
  color:#333;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  width:90%;
  max-width:460px;
}
h1{margin:0 0 10px 0;font-size:22px;color:#0f4c81;}
#lokasi{font-weight:bold;margin:10px 0;color:#1e88e5;}
.loader{
  margin:20px auto;
  border:6px solid #eee;
  border-top:6px solid #1e88e5;
  border-radius:50%;
  width:40px;height:40px;
  animation:spin 1s linear infinite;
}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.small{font-size:13px;color:#777;margin-top:15px}
.error{color:red;font-weight:bold}
</style>

<script>
// ====== MAPPING LOKASI ANDA ======
const lokasiSPKLU = {
  "SPKLU01": "SPKLU PLN UIW NTB",
  "SPKLU02": "SPKLU DINAS PERHUBUNGAN PROVINSI NTB",
  "SPKLU03": "SPKLU PLN UP3 MATARAM",
  "SPKLU04": "SPKLU SANTIKA MATARAM",
  "SPKLU05": "SPKLU TAMAN SANGKAREANG",
  "SPKLU06": "SPKLU KANTOR GUBERNUR NTB",
  "SPKLU07": "SPKLU PRIME PARK HOTEL",
  "SPKLU08": "SPKLU EPICENTRUM 2",
  "SPKLU09": "SPKLU LOMBOK EPICENTRUM MALL 2",
  "SPKLU10": "SPKLU CENTER LOMBOK EPICENTRUM MALL",
  "SPKLU11": "SPKLU CENTER LOMBOK EPICENTRUM MALL",
  "SPKLU12": "SPKLU CENTER LOMBOK EPICENTRUM MALL",
  "SPKLU13": "SPKLU CENTER LOMBOK EPICENTRUM MALL",
  "SPKLU14": "SPKLU CENTER LOMBOK EPICENTRUM MALL",
  "SPKLU15": "SPKLU CENTER LOMBOK EPICENTRUM MALL",
  "SPKLU16": "SPKLU CENTER LOMBOK EPICENTRUM MALL",
  "SPKLU17": "SPKLU MVP GRAND NATURA",
  "SPKLU18": "SPKLU GOLDEN PALACE HOTEL",
  "SPKLU19": "SPKLU PLN PLTU JERANJANG",
  "SPKLU20": "SPKLU TRANSMART MATARAM",
  "SPKLU21": "SPKLU BANK MANDIRI CAKRA",
  "SPKLU22": "SPKLU KANTOR ESDM PROVINSI NTB",
  "SPKLU23": "SPKLU SASAKU LOMBOK",
  "SPKLU24": "SPKLU SHERATON SENGGIGI",
  "SPKLU25": "SPKLU PLN ULP TANJUNG NTB",
  "SPKLU26": "SPKLU ULP PRAYA",
  "SPKLU27": "SPKLU HOTEL ILLIRA",
  "SPKLU28": "SPKLU MANDALIKA",
  "SPKLU29": "SPKLU MANDALIKA",
  "SPKLU30": "SPKLU PLN ULP SELONG",
  "SPKLU31": "SPKLU SMK N 1 PRINGGABAYA",
  "SPKLU32": "SPKLU BOBO CABIN SEMBALUN",
  "SPKLU33": "SPKLU PLN UP3 SUMBAWA",
  "SPKLU34": "SPKLU PLN UP3 SUMBAWA",
  "SPKLU35": "SPKLU PLN ULP ALAS",
  "SPKLU36": "SPKLU PLN PLTD LABUHAN",
  "SPKLU37": "SPKLU PLN KP SORIUTU",
  "SPKLU38": "SPKLU PLN ULP EMPANG",
  "SPKLU39": "SPKLU PLN ULP EMPANG",
  "SPKLU40": "SPKLU PLN ULP DOMPU",
  "SPKLU41": "SPKLU PLN KP BOLO",
  "SPKLU42": "SPKLU PLN UP3 BIMA",
  "SPKLU43": "SPKLU PLN ULP BIMA KOTA",
  "SPKLU44": "SPKLU PLN ULP WOHA",
  "SPKLU45": "SPKLU PLN ULP SAPE",
  "SPKLU46": "SPKLU PLN ULP TALIWANG"
};

// ====== BACA CSV JADWAL ======
async function getJadwal() {
  const res = await fetch('jadwal.csv');
  const text = await res.text();
  return text.split('\n').slice(1).map(r=>{
    const [tgl,mulai,selesai,nama,no]=r.split(',');
    return {tgl,mulai,selesai,nama,no};
  });
}

function nowTime(){return new Date().toTimeString().slice(0,5);}
function nowDate(){return new Date().toISOString().slice(0,10);}

async function start(){
  const url = new URL(window.location.href);
  const id = url.searchParams.get("id");
  const lokasi = lokasiSPKLU[id] || id;

  document.getElementById("lokasi").innerText = lokasi;

  const jadwal = await getJadwal();
  const shift = jadwal.find(j =>
    j.tgl === nowDate() &&
    nowTime() >= j.mulai &&
    nowTime() <= j.selesai
  );

  if(!shift){
    document.getElementById("status").innerHTML =
      "<div class='error'>Tidak ada teknisi piket saat ini</div>";
    return;
  }

  const pesan = `Halo ${shift.nama},
Saya berada di ${lokasi}.
Mohon bantuan pengecekan SPKLU.

Waktu: ${nowDate()} ${nowTime()}`;

  const link = `https://wa.me/${shift.no}?text=${encodeURIComponent(pesan)}`;

  setTimeout(()=>{ window.location.href = link; }, 2500);
}

window.onload = start;
</script>
</head>

<body>
  <div class="card">
    <h1>Bantuan SPKLU PLN</h1>
    <div id="lokasi">Memuat lokasi...</div>
    <div class="loader"></div>
    <div id="status">Menghubungkan ke teknisi piket...</div>
    <div class="small">Silakan tunggu, Anda akan diarahkan ke WhatsApp teknisi.</div>
  </div>
</body>
</html>
